name: woli-delivery

services:
  # ===========================================
  # MySQL Database
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: woli_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: woli_delivery
      MYSQL_USER: woli_user
      MYSQL_PASSWORD: woli_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - woli_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis Cache & Sessions
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: woli_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - woli_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Adminer (MySQL Web Interface)
  # ===========================================
  adminer:
    image: adminer:latest
    container_name: woli_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - woli_network
    depends_on:
      - mysql

# ===========================================
# Networks
# ===========================================
networks:
  woli_network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
